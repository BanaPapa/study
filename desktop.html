<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>몽글 · 공부 기록 (데스크탑)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:        oklch(98% 0.012 300);
  --surface:   oklch(100% 0 0);
  --surface-2: oklch(98.5% 0.008 300);
  --fg:        oklch(32% 0.03 300);
  --muted:     oklch(56% 0.025 300);
  --faint:     oklch(72% 0.02 300);
  --border:    oklch(92% 0.012 300);
  --border-2:  oklch(88% 0.016 300);
  --accent:    oklch(64% 0.15 300);
  --accent-soft: oklch(94% 0.04 300);
  --mint:      oklch(78% 0.11 165);
  --mint-soft: oklch(95% 0.05 165);
  --peach:     oklch(82% 0.09 55);
  --peach-soft:oklch(95% 0.045 55);
  --sky:       oklch(80% 0.09 230);
  --sky-soft:  oklch(95% 0.045 230);
  --lemon:     oklch(88% 0.10 95);
  --rose:      oklch(80% 0.10 15);
  --rose-soft: oklch(95% 0.04 15);
  --shadow:    0 1px 2px oklch(50% 0.05 300 / .06), 0 8px 24px oklch(50% 0.05 300 / .08);
  --shadow-lg: 0 12px 40px oklch(50% 0.08 300 / .18);
  --r-sm:8px; --r:14px; --r-lg:22px;
  --sb-w: 300px;
  --font: "Pretendard Variable", Pretendard, -apple-system, system-ui, sans-serif;
  --font-cute: "Jua", "Pretendard Variable", Pretendard, system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  background:
    radial-gradient(900px 600px at 88% -10%, var(--mint-soft), transparent 60%),
    radial-gradient(800px 600px at -5% 110%, var(--peach-soft), transparent 55%),
    var(--bg);
  color:var(--fg);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--accent-soft)}

/* ---------- shell ---------- */
.app{display:grid;grid-template-columns:var(--sb-w) 1fr;grid-template-rows:auto 1fr;height:100vh;
  grid-template-areas:"top top" "side main";gap:0;transition:grid-template-columns .25s}
.app.nav-collapsed{grid-template-columns:48px 1fr}
.topbar{grid-area:top;display:flex;align-items:center;gap:16px;padding:14px 22px;
  background:oklch(100% 0 0 / .7);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--font-cute);font-size:21px;
  color:var(--fg);letter-spacing:.2px;user-select:none}
.brand .logo{width:34px;height:34px;flex:none}
.brand small{font-family:var(--font);font-size:11px;color:var(--faint);font-weight:600;
  background:var(--accent-soft);padding:2px 7px;border-radius:20px;margin-left:2px}

.search{flex:1;max-width:440px;margin:0 auto;position:relative}
.search input{width:100%;padding:10px 14px 10px 40px;border-radius:30px;
  border:1.5px solid var(--border-2);background:var(--surface);font-size:14px;color:var(--fg);
  transition:border-color .2s, box-shadow .2s}
.search input::placeholder{color:var(--faint)}
.search input:focus{outline:none;border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-soft)}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:17px;height:17px;color:var(--faint)}

.streak{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:30px;
  background:linear-gradient(135deg, var(--peach-soft), var(--lemon));
  font-weight:700;font-size:13px;color:oklch(45% 0.09 55);white-space:nowrap;user-select:none;
  box-shadow:var(--shadow)}
.streak .fire{font-size:16px;animation:flicker 2.4s ease-in-out infinite}
@keyframes flicker{0%,100%{transform:rotate(-4deg) scale(1)}50%{transform:rotate(4deg) scale(1.12)}}

/* ---------- sidebar ---------- */
.sidebar{grid-area:side;background:oklch(100% 0 0 / .55);border-right:1px solid var(--border);
  display:flex;flex-direction:column;min-height:0;backdrop-filter:blur(8px);position:relative;overflow:hidden}
/* ---- collapsed icon rail ---- */
.app.nav-collapsed .sidebar .side-head{justify-content:center;padding:10px 4px 8px}
.app.nav-collapsed .sidebar .side-head h2{display:none}
.app.nav-collapsed .sidebar #btn-new-root,
.app.nav-collapsed .sidebar #btn-collapse{display:none}
.app.nav-collapsed .sidebar #btn-nav-toggle{opacity:1;pointer-events:auto}

/* tree: only show top-level rows as icon pills */
.app.nav-collapsed .sidebar .tree{padding:4px 4px 24px;overflow-x:hidden}
.app.nav-collapsed .sidebar .tree > .node > .row{
  justify-content:center;padding:7px 4px;margin:2px 0;border-radius:10px;position:relative}
.app.nav-collapsed .sidebar .tree > .node > .row .twist,
.app.nav-collapsed .sidebar .tree > .node > .row .name,
.app.nav-collapsed .sidebar .tree > .node > .row .count,
.app.nav-collapsed .sidebar .tree > .node > .row .dot{display:none}
.app.nav-collapsed .sidebar .tree > .node > .row .emoji{font-size:20px;width:auto}
/* hide children and deeper nodes */
.app.nav-collapsed .sidebar .tree > .node > .kids{display:none !important}
.app.nav-collapsed .sidebar .tree .node .node{display:none}
/* tooltip on hover */
.app.nav-collapsed .sidebar .tree > .node > .row::after{
  content:attr(data-name);
  position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);
  background:var(--fg);color:var(--surface);border-radius:9px;
  padding:5px 11px;font-size:12.5px;font-weight:700;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .15s;z-index:400;
  box-shadow:0 4px 14px oklch(0 0 0 /.18)}
.app.nav-collapsed .sidebar .tree > .node > .row:hover::after{opacity:1}
.resize-handle{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:20;
  background:transparent;transition:background .15s}
.resize-handle:hover,.resizing .resize-handle{background:var(--accent);opacity:.35}
.side-head{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px}
.side-head h2{font-size:14px;font-weight:800;letter-spacing:.08em;color:var(--muted);
  text-transform:uppercase}
.side-tools{display:flex;gap:4px}
.icon-btn{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:var(--muted);
  transition:background .15s,color .15s,transform .1s}
.icon-btn:hover{background:var(--accent-soft);color:var(--accent)}
.icon-btn:active{transform:scale(.9)}
.icon-btn svg{width:17px;height:17px}

.tree{flex:1;overflow:auto;padding:4px 10px 24px;scrollbar-width:thin}
.tree::-webkit-scrollbar{width:8px}
.tree::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:10px}

.node{user-select:none}
.row{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:10px;position:relative;
  cursor:pointer;transition:background .12s;font-size:16px;min-height:36px}
.row:hover{background:var(--surface-2)}
.row.sel{background:var(--accent-soft)}
.row.sel .name{color:var(--accent);font-weight:700}
.row.drop-nest{background:var(--mint-soft);box-shadow:inset 0 0 0 2px var(--mint)}
.row.drop-before{box-shadow:0 -2.5px 0 0 var(--accent)}
.row.drop-after{box-shadow:0 2.5px 0 0 var(--accent)}
.row.dragging{opacity:.4}
.twist{width:18px;height:18px;flex:none;display:grid;place-items:center;color:var(--faint);
  transition:transform .18s}
.twist svg{width:12px;height:12px}
.node.open>.row>.twist{transform:rotate(90deg)}
.twist.leaf{visibility:hidden}
.dot{width:11px;height:11px;border-radius:4px;flex:none;box-shadow:inset 0 0 0 1px oklch(0 0 0 /.06)}
.emoji{font-size:15px;flex:none;width:18px;text-align:center;cursor:pointer;border-radius:5px;transition:transform .15s,background .15s}
.emoji:hover{transform:scale(1.3);background:var(--accent-soft)}
.name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.count{font-size:13px;color:var(--faint);background:var(--surface-2);border-radius:20px;
  padding:1px 7px;font-weight:700;font-variant-numeric:tabular-nums}
.row.sel .count{background:oklch(100% 0 0 / .6)}
.kids{overflow:hidden;display:none}
.node.open>.kids{display:block}
.kids{padding-left:14px;margin-left:9px;border-left:1.5px dashed var(--border-2)}


/* ---------- main ---------- */
.main{grid-area:main;overflow:auto;min-height:0;padding:26px 34px 60px}
.main::-webkit-scrollbar{width:10px}
.main::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:10px}

.crumbs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:8px}
.crumbs b{color:var(--fg)}
.crumbs .sep{color:var(--faint)}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px}
.page-title{display:flex;align-items:center;gap:13px}
.page-title .badge{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;
  font-size:24px;flex:none;box-shadow:var(--shadow)}
.page-title h1{font-family:var(--font-cute);font-size:30px;font-weight:400;letter-spacing:.3px;line-height:1.1}
.page-title p{font-size:13px;color:var(--muted);margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 18px;border-radius:30px;
  font-weight:700;font-size:14px;transition:transform .12s,box-shadow .2s,filter .2s}
.btn svg{width:16px;height:16px}
.btn-primary{background:linear-gradient(135deg, var(--accent), oklch(70% 0.14 330));color:#fff;
  box-shadow:0 6px 18px oklch(64% 0.15 300 / .35)}
.btn-primary:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0) scale(.98)}

/* stat cards */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat .k{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.stat .v{font-family:var(--font-cute);font-size:30px;margin-top:6px;line-height:1}
.stat .v small{font-size:14px;color:var(--muted);font-family:var(--font);font-weight:600}
.stat .blob{position:absolute;right:-18px;bottom:-18px;width:70px;height:70px;border-radius:50%;
  opacity:.5;filter:blur(2px)}

/* timeline (leaf view) */
.timeline{display:flex;flex-direction:column;gap:0}
.day{margin-bottom:8px}
.day-label{display:flex;align-items:center;gap:10px;margin:18px 0 12px}
.day-label .date{font-weight:800;font-size:14px;color:var(--fg)}
.day-label .rel{font-size:12px;color:var(--faint);background:var(--surface);border:1px solid var(--border);
  padding:2px 9px;border-radius:20px;font-weight:600}
.day-label .line{flex:1;height:1px;background:var(--border)}

.entry{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:20px 22px;box-shadow:var(--shadow);margin-bottom:14px;position:relative;
  transition:transform .15s,box-shadow .2s;animation:rise .4s both}
.entry:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.entry h3{font-size:18px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:9px}
.entry h3 .tick{width:22px;height:22px;border-radius:7px;background:var(--mint-soft);color:oklch(45% 0.12 165);
  display:grid;place-items:center;font-size:13px;flex:none}
.entry .body{font-size:14.5px;line-height:1.7;color:var(--muted)}
.entry .body ul{margin:8px 0 0 18px}
.entry .body li{margin:3px 0}
.attach{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;
  padding:7px 12px;border-radius:20px;border:1px solid var(--border-2);background:var(--surface-2);
  color:var(--muted);transition:all .15s;cursor:pointer}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);transform:translateY(-1px)}
.chip svg{width:14px;height:14px}
.chip.doc{background:var(--sky-soft);color:oklch(45% 0.1 230);border-color:transparent}
.chip.video{background:var(--rose-soft);color:oklch(50% 0.13 15);border-color:transparent}
.chip.link{background:var(--mint-soft);color:oklch(43% 0.11 165);border-color:transparent}

/* overview (folder view) */
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .2s;
  position:relative;overflow:hidden;animation:rise .4s both}
.cat-card:hover{transform:translateY(-3px) rotate(-.4deg);box-shadow:var(--shadow-lg)}
.cat-card .top{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.cat-card .ic{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:22px;flex:none}
.cat-card .top h4{font-size:16px;font-weight:800}
.cat-card .top span{font-size:12px;color:var(--muted)}
.ring-row{display:flex;align-items:center;gap:14px}
.ring{--p:0;width:54px;height:54px;border-radius:50%;flex:none;
  background:conic-gradient(var(--rc,var(--accent)) calc(var(--p)*1%), var(--surface-2) 0);
  display:grid;place-items:center;position:relative}
.ring::after{content:"";position:absolute;inset:6px;border-radius:50%;background:var(--surface)}
.ring b{position:relative;font-size:13px;font-weight:800;font-variant-numeric:tabular-nums}
.ring-row .meta{font-size:12.5px;color:var(--muted);line-height:1.5}
.ring-row .meta b{color:var(--fg);font-size:14px}

/* mascot */
.mascot{position:fixed;right:26px;bottom:22px;display:flex;align-items:flex-end;gap:10px;z-index:40;
  pointer-events:none}
.bubble{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-lg);
  border-radius:18px 18px 4px 18px;padding:10px 14px;font-size:13px;font-weight:600;max-width:200px;
  opacity:0;transform:translateY(6px) scale(.96);transition:all .25s;color:var(--fg)}
.bubble.show{opacity:1;transform:none}
.mochi{width:62px;height:62px;flex:none;animation:bob 3.2s ease-in-out infinite;transform-origin:bottom}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* context menu */
.ctx{position:fixed;z-index:200;background:var(--surface);border:1px solid var(--border-2);
  border-radius:14px;box-shadow:var(--shadow-lg);padding:6px;min-width:178px;display:none;
  animation:pop .12s both}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.ctx button{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:9px;
  font-size:13.5px;font-weight:600;color:var(--fg);text-align:left}
.ctx button:hover{background:var(--accent-soft);color:var(--accent)}
.ctx button.danger:hover{background:var(--rose-soft);color:oklch(50% 0.15 15)}
.ctx svg{width:15px;height:15px}
.ctx .div{height:1px;background:var(--border);margin:5px 4px}

/* main content context menu */
.main-ctx{position:fixed;z-index:200;background:var(--surface);border:1px solid var(--border-2);
  border-radius:14px;box-shadow:var(--shadow-lg);padding:6px;min-width:140px;display:none;
  animation:pop .12s both}
.main-ctx button{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:9px;
  font-size:13.5px;font-weight:600;color:var(--fg);text-align:left}
.main-ctx button.danger:hover{background:var(--rose-soft);color:oklch(50% 0.15 15)}
.main-ctx svg{width:15px;height:15px}

/* emoji picker */
.emoji-picker{position:fixed;z-index:200;background:var(--surface);border:1px solid var(--border-2);
  border-radius:16px;box-shadow:var(--shadow-lg);padding:12px;width:272px;display:none;animation:pop .12s both}
.ep-title{font-size:11.5px;font-weight:800;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;
  margin-bottom:8px;padding:0 2px}
.ep-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;max-height:188px;overflow:auto}
.ep-grid button{width:38px;height:38px;border-radius:10px;font-size:19px;display:grid;place-items:center;
  transition:background .12s,transform .12s}
.ep-grid button:hover{background:var(--accent-soft);transform:scale(1.14)}
.ep-custom{display:flex;gap:7px;margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.ep-custom input{flex:1;min-width:0;border:1.5px solid var(--border-2);border-radius:10px;padding:8px 10px;
  font-size:15px;font-family:inherit;color:var(--fg)}
.ep-custom input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.ep-custom button{background:var(--accent);color:#fff;border-radius:10px;padding:0 14px;font-weight:700;
  font-size:12.5px;flex:none}

/* nav pill (stats) */
.nav-pill{display:flex;align-items:center;gap:7px;padding:8px 15px;border-radius:30px;
  background:var(--surface);border:1.5px solid var(--border-2);font-weight:700;font-size:13px;
  color:var(--muted);transition:all .15s;white-space:nowrap}
.nav-pill svg{width:15px;height:15px}
.nav-pill:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.nav-pill.active{background:linear-gradient(135deg,var(--accent),oklch(70% 0.14 330));color:#fff;
  border-color:transparent;box-shadow:0 6px 16px oklch(64% 0.15 300 / .3)}

/* tags on entry cards */
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag-pill{font-size:11.5px;font-weight:700;color:oklch(48% 0.1 300);background:var(--accent-soft);
  border-radius:20px;padding:3px 10px}
.entry{cursor:pointer}

/* ---------------- entry modal ---------------- */
.modal-overlay{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;
  background:oklch(25% 0.02 300 / .38);backdrop-filter:blur(3px);padding:24px}
.modal-overlay.show{display:flex}
.modal{width:100%;max-width:580px;max-height:88vh;background:var(--surface);border-radius:26px;
  box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;animation:rise .22s both}
.modal-head{display:flex;align-items:center;gap:10px;padding:20px 18px 0 24px}
.modal-title-input{flex:1;border:none;outline:none;font-family:var(--font-cute);font-size:22px;
  color:var(--fg);background:none;min-width:0}
.modal-title-input::placeholder{color:var(--faint);font-family:var(--font)}
.modal-sub{display:flex;align-items:center;gap:10px;padding:6px 24px 14px}
.date-input{border:1.5px solid var(--border-2);border-radius:10px;padding:7px 10px;font-size:12.5px;
  font-weight:600;color:var(--muted);font-family:inherit}
.date-input:focus{outline:none;border-color:var(--accent)}
.modal-sub-hint{font-size:12px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-tabs{display:flex;gap:4px;padding:0 18px;border-bottom:1px solid var(--border)}
.tab-btn{padding:10px 14px;font-size:13px;font-weight:700;color:var(--muted);border-bottom:2.5px solid transparent;
  display:flex;align-items:center;gap:5px;transition:color .15s}
.tab-btn:hover{color:var(--accent)}
.tab-btn.active{color:var(--accent);border-color:var(--accent)}
.tab-count{font-size:10.5px;background:var(--accent-soft);color:var(--accent);border-radius:10px;
  padding:1px 6px;font-weight:800}
.modal-body{flex:1;overflow:auto;padding:18px 24px;min-height:230px}
.tab-pane{display:none}
.tab-pane.active{display:block}
#em-body{width:100%;min-height:220px;border:none;outline:none;resize:vertical;font-family:inherit;
  font-size:14.5px;line-height:1.7;color:var(--fg)}
#em-body::placeholder{color:var(--faint)}
.file-drop{display:flex;align-items:center;justify-content:center;gap:8px;padding:22px;
  border:1.5px dashed var(--border-2);border-radius:16px;color:var(--muted);font-size:13.5px;
  font-weight:600;cursor:pointer;transition:all .15s}
.file-drop:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.file-drop svg{width:18px;height:18px}
.file-list,.link-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.file-item,.link-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;
  background:var(--surface-2);border:1px solid var(--border)}
.fi-ic,.li-ic{font-size:17px;flex:none}
.fi-name{flex:1;font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-text{flex:1;min-width:0;font-size:13.5px}
.li-text b{font-weight:700;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-text small{color:var(--faint);font-size:11.5px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi-remove{flex:none;width:24px;height:24px;border-radius:8px;color:var(--faint);font-size:12px;
  display:grid;place-items:center;transition:all .15s}
.fi-remove:hover{background:var(--rose-soft);color:oklch(50% 0.15 15)}
.link-add{display:flex;gap:8px}
.link-add input{border:1.5px solid var(--border-2);border-radius:10px;padding:9px 11px;font-size:13px;
  font-family:inherit;color:var(--fg)}
.link-add input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
#em-link-label{width:38%}
#em-link-url{flex:1;min-width:0}
.btn-mini{flex:none;background:var(--accent);color:#fff;border-radius:10px;padding:0 16px;font-weight:700;
  font-size:12.5px}
.tab-empty{font-size:13px;color:var(--faint);text-align:center;padding:18px 0}
.modal-tags{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:14px 24px;border-top:1px solid var(--border)}
.tags-label{font-size:12px;font-weight:800;color:var(--muted);flex:none}
.tag-chips{display:flex;flex-wrap:wrap;gap:6px}
.tag-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-soft);color:oklch(48% 0.1 300);
  border-radius:20px;padding:4px 6px 4px 11px;font-size:12px;font-weight:700}
.tag-chip button{width:16px;height:16px;border-radius:50%;display:grid;place-items:center;font-size:9px;
  color:oklch(48% 0.1 300);background:oklch(100% 0 0 / .5)}
#em-tag-input{flex:1;min-width:120px;border:none;border-bottom:1.5px solid var(--border-2);padding:5px 2px;
  font-size:13px;font-family:inherit;color:var(--fg)}
#em-tag-input:focus{outline:none;border-color:var(--accent)}
.modal-foot{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;
  border-top:1px solid var(--border);background:var(--surface-2)}
.modal-foot-right{display:flex;gap:8px}
.btn-text{padding:10px 16px;border-radius:30px;font-size:13.5px;font-weight:700;color:var(--muted)}
.btn-text:hover{background:var(--border)}
.btn-text.danger{color:oklch(55% 0.15 15)}
.btn-text.danger:hover{background:var(--rose-soft)}

/* ---------------- stats page ---------------- */
.stats-h2{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.04em;margin:30px 0 14px;
  text-transform:uppercase}
.cat-bars{display:flex;flex-direction:column;gap:10px}
.cat-bar-row{display:grid;grid-template-columns:160px 1fr 96px;align-items:center;gap:14px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;box-shadow:var(--shadow)}
.cbr-label{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;overflow:hidden}
.cbr-label span{font-size:16px}
.cbr-track{height:9px;border-radius:20px;background:var(--surface-2);overflow:hidden}
.cbr-fill{height:100%;border-radius:20px;transition:width .4s}
.cbr-val{font-size:12px;color:var(--muted);font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.day-bars{display:flex;align-items:flex-end;gap:8px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:18px 16px 12px;box-shadow:var(--shadow)}
.dbar{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.dbar-fill{width:100%;max-width:18px;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,var(--accent),oklch(70% 0.14 330))}
.dbar span{font-size:10.5px;color:var(--faint);font-weight:700}
.tag-cloud{display:flex;flex-wrap:wrap;gap:9px}
.tagchip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--border-2);
  border-radius:20px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--fg);transition:all .15s;
  box-shadow:var(--shadow)}
.tagchip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);transform:translateY(-2px)}
.tagchip span{font-size:11px;color:var(--faint);background:var(--surface-2);border-radius:10px;padding:1px 7px}
.tagchip:hover span{color:var(--accent);background:var(--accent-soft)}

/* empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;color:var(--muted);padding:70px 20px;gap:6px}
.empty .big{font-size:46px}
.empty h3{font-family:var(--font-cute);font-size:22px;color:var(--fg);font-weight:400}
.empty p{font-size:13.5px}

/* sparkle layer */
.fx{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.spark{position:absolute;font-size:18px;animation:spark .8s ease-out forwards}
@keyframes spark{0%{opacity:1;transform:translate(0,0) scale(.4) rotate(0)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.2) rotate(180deg)}}

/* ---------- focus & keyboard ---------- */
:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:4px}
.icon-btn:focus-visible,.btn:focus-visible,.nav-pill:focus-visible,
.cat-card:focus-visible,.entry:focus-visible,.tagchip:focus-visible,
.theme-swatch:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:inherit}
.row:focus-visible{outline:2.5px solid var(--accent);outline-offset:-2px}
.btn-mini:hover{filter:brightness(1.07);transform:translateY(-1px)}
.btn-mini:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px}

/* ---------- search clear ---------- */
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;border-radius:50%;background:var(--border-2);color:var(--muted);
  font-size:14px;display:none;place-items:center;line-height:1;transition:all .15s}
.search-clear.show{display:grid}
.search-clear:hover{background:var(--muted);color:var(--surface)}

.hint-edit{display:inline-block;font-size:11px;color:var(--faint);margin-left:8px}

/* ---------- search result cards ---------- */
.search-hit{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:16px 20px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.search-hit:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search-hit-path{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500}
.search-hit-title{font-size:15px;font-weight:700;color:var(--fg);margin-bottom:4px}
.search-hit-body{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.search-hit-foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.inline-rename{flex:1;min-width:60px;border:none;border-bottom:2px solid var(--accent);
  background:transparent;font-family:inherit;font-size:inherit;color:var(--fg);
  padding:0 2px;outline:none}

@media (max-width:1040px){
  .app{grid-template-columns:var(--sb-w,240px) 1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
}

/* ---------- settings panel ---------- */
.settings-overlay{position:fixed;inset:0;z-index:500;display:none;justify-content:flex-end}
.settings-overlay.show{display:flex}
.settings-scrim{position:absolute;inset:0;background:oklch(20% 0.02 300 / .28);backdrop-filter:blur(2px)}
.settings-panel{position:relative;width:360px;max-width:95vw;height:100%;background:var(--surface);
  border-left:1px solid var(--border);box-shadow:-8px 0 40px oklch(30% 0.05 300 / .18);
  display:flex;flex-direction:column;animation:slideIn .25s both;overflow:hidden}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.sp-head{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 14px;
  border-bottom:1px solid var(--border)}
.sp-head h2{font-family:var(--font-cute);font-size:20px;font-weight:400}
.sp-body{flex:1;overflow:auto;padding:18px 20px 32px}
.sp-body::-webkit-scrollbar{width:6px}
.sp-body::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:10px}
.sp-section{margin-bottom:28px}
.sp-section h3{font-size:11.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.sp-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:13px}
.sp-row label{font-size:14px;font-weight:600;color:var(--fg);flex:none}
.sp-row select,.sp-row input[type=range]{font-family:inherit;border:1.5px solid var(--border-2);
  border-radius:10px;padding:7px 10px;font-size:13px;color:var(--fg);background:var(--surface-2);
  cursor:pointer;min-width:0}
.sp-row select:focus,.sp-row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.sp-row input[type=range]{padding:0;height:6px;accent-color:var(--accent);width:130px;border:none;background:none}
.sp-val{font-size:13px;font-weight:700;color:var(--accent);min-width:36px;text-align:right}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.theme-swatch{border-radius:16px;padding:12px;cursor:pointer;border:2.5px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:7px;font-size:12px;font-weight:700;
  color:var(--fg);transition:transform .14s,border-color .15s;background:var(--surface-2)}
.theme-swatch:hover{transform:scale(1.03)}
.theme-swatch.active{border-color:var(--accent)}
.theme-dot{width:34px;height:34px;border-radius:50%}

/* ---------- add-root mini modal ---------- */
#add-root-overlay .modal{max-width:400px}
#add-root-overlay .modal-head{padding-bottom:16px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>
<div class="app">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 40 40" fill="none">
        <rect x="3" y="3" width="34" height="34" rx="12" fill="oklch(94% 0.04 300)"/>
        <circle cx="15" cy="18" r="2.4" fill="oklch(40% 0.05 300)"/>
        <circle cx="25" cy="18" r="2.4" fill="oklch(40% 0.05 300)"/>
        <path d="M15 25 q5 4 10 0" stroke="oklch(64% 0.15 300)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
        <circle cx="11" cy="23" r="2.2" fill="oklch(82% 0.09 55)" opacity=".8"/>
        <circle cx="29" cy="23" r="2.2" fill="oklch(82% 0.09 55)" opacity=".8"/>
      </svg>
      몽글 <small>공부기록</small>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" placeholder="기록·태그·카테고리 검색… (#태그 로 태그 검색 가능)">
      <button class="search-clear" id="search-clear" aria-label="검색 지우기">×</button>
    </div>
    <button class="nav-pill" id="btn-stats" title="태그·카테고리 통계 보기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16v-5M12 16V8M17 16v-9"/></svg>
      통계
    </button>
    <div class="streak"><span class="fire">🔥</span> 7일 연속!</div>
    <button class="icon-btn" id="btn-settings" title="설정" aria-label="설정" style="flex:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="side-head">
      <h2>내 카테고리</h2>
      <div class="side-tools">
        <button class="icon-btn" id="btn-new-root" title="새 대분류 추가" aria-label="새 대분류 추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M12 11v4M10 13h4"/></svg>
        </button>
        <button class="icon-btn" id="btn-collapse" title="모두 접기/펼치기" aria-label="모두 접기/펼치기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9h16M4 15h16"/></svg>
        </button>
        <button class="icon-btn" id="btn-nav-toggle" title="네비게이션 접기/펼치기" aria-label="네비게이션 접기/펼치기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 3v18"/></svg>
        </button>
      </div>
    </div>
    <nav class="tree" id="tree"></nav>
    <div class="resize-handle" id="resize-handle"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<!-- mascot -->
<div class="mascot">
  <div class="bubble" id="bubble">오늘도 한 줄 기록해볼까? ✏️</div>
  <svg class="mochi" id="mochi" viewBox="0 0 80 80">
    <ellipse cx="40" cy="74" rx="20" ry="4" fill="oklch(64% 0.15 300 / .15)"/>
    <path d="M18 46 q-4 -30 22 -30 q26 0 22 30 q2 16 -22 16 q-24 0 -22 -16z" fill="oklch(96% 0.05 300)" stroke="oklch(64% 0.15 300)" stroke-width="2"/>
    <circle cx="31" cy="42" r="3" fill="oklch(38% 0.05 300)"/>
    <circle cx="49" cy="42" r="3" fill="oklch(38% 0.05 300)"/>
    <circle cx="26" cy="48" r="3" fill="oklch(82% 0.09 55)" opacity=".7"/>
    <circle cx="54" cy="48" r="3" fill="oklch(82% 0.09 55)" opacity=".7"/>
    <path d="M35 49 q5 4 10 0" stroke="oklch(64% 0.15 300)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M40 16 q2 -7 8 -8 q-3 5 -2 9z" fill="oklch(78% 0.11 165)"/>
  </svg>
</div>

<!-- context menu -->
<div class="ctx" id="ctx">
  <button data-act="new-folder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M12 11v4M10 13h4"/></svg>하위 카테고리 추가</button>
  <button data-act="new-leaf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M5 3h9l5 5v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg>학습 기록함 추가</button>
  <button data-act="rename"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>이름 변경</button>
  <button data-act="emoji">😊 이모지 변경</button>
  <div class="div"></div>
  <button data-act="delete" class="danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></svg>삭제</button>
</div>

<!-- main content context menu -->
<div class="main-ctx" id="main-ctx">
  <button id="main-ctx-delete" class="danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></svg>삭제</button>
</div>

<!-- emoji picker -->
<div class="emoji-picker" id="emoji-picker">
  <div class="ep-title">이모지 고르기</div>
  <div class="ep-grid" id="ep-grid"></div>
  <div class="ep-custom">
    <input id="emoji-custom" maxlength="4" placeholder="직접 붙여넣기도 가능해요">
    <button id="emoji-apply">적용</button>
  </div>
</div>

<!-- entry add/edit modal -->
<div class="modal-overlay" id="entry-modal-overlay">
  <div class="modal" id="entry-modal">
    <div class="modal-head">
      <input type="text" id="em-title" class="modal-title-input" placeholder="오늘 공부한 제목을 적어주세요">
      <button class="icon-btn" id="em-close" title="닫기" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-sub">
      <input type="date" id="em-date" class="date-input" value="2026-06-19">
      <span class="modal-sub-hint" id="em-context"></span>
    </div>
    <div class="modal-tabs">
      <button class="tab-btn active" data-tab="content">📝 내용</button>
      <button class="tab-btn" data-tab="files">📎 파일 <span class="tab-count" id="tab-count-files"></span></button>
      <button class="tab-btn" data-tab="links">🔗 링크 <span class="tab-count" id="tab-count-links"></span></button>
    </div>
    <div class="modal-body">
      <div class="tab-pane active" data-pane="content">
        <textarea id="em-body" placeholder="배운 내용을 자유롭게 적어보세요. 줄 앞에 '- '를 붙이면 목록이 돼요."></textarea>
      </div>
      <div class="tab-pane" data-pane="files">
        <label class="file-drop" for="em-file-input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          클릭해서 파일을 선택하거나 끌어다 놓아주세요
        </label>
        <input type="file" id="em-file-input" multiple style="display:none">
        <div class="file-list" id="em-file-list"></div>
      </div>
      <div class="tab-pane" data-pane="links">
        <div class="link-add">
          <input type="text" id="em-link-label" placeholder="이름 (예: 공식문서)">
          <input type="url" id="em-link-url" placeholder="https://...">
          <button id="em-link-add" class="btn-mini">추가</button>
        </div>
        <div class="link-list" id="em-link-list"></div>
      </div>
    </div>
    <div class="modal-tags">
      <span class="tags-label">🏷️ 태그</span>
      <div class="tag-chips" id="em-tags"></div>
      <input type="text" id="em-tag-input" placeholder="태그 입력 후 Enter">
    </div>
    <div class="modal-foot">
      <button class="btn-text danger" id="em-delete" style="display:none">🗑️ 삭제</button>
      <div class="modal-foot-right">
        <button class="btn-text" id="em-cancel">취소</button>
        <button class="btn btn-primary" id="em-save">저장 ✓</button>
      </div>
    </div>
  </div>
</div>

<!-- add-root mini modal -->
<div class="modal-overlay" id="add-root-overlay">
  <div class="modal" style="max-width:400px">

let data = [

      {date:"2026-06-16", title:"CSS 컨테이너 쿼리", body:"부모 크기에 반응하는 레이아웃. 미디어쿼리보다 컴포넌트 친화적.", attach:[{t:"video",n:"강의 클립"}]},

    {id:nid(), name:"일본어", emoji:"🇯🇵", kids:[

    ]},
  ]},
];

/* assign top-level colors */
data.forEach((c,i)=>c.color = PALETTE[i % PALETTE.length]);

/* entry id + tags + files/links backfill */
let euid = 1000;
const neid = () => "e"+(euid++);
const TAG_HINTS = [
  [/정렬|퀵정렬|병합정렬/, ["알고리즘","정렬","복잡도"]],
  [/그래프|BFS|DFS|다익스트라/, ["알고리즘","그래프"]],
  [/힙|이진 힙/, ["자료구조","힙"]],
  [/환경변수|토큰|세팅/, ["설정","헤르메스"]],
  [/멀티 인스턴스/, ["설정","트러블슈팅"]],
  [/라우팅|브로커|멱등/, ["개념정리","메시징"]],
  [/백프레셔|컨슈머/, ["개념정리","메시징"]],
  [/용어 첫 정리/, ["개념정리","헤르메스"]],
  [/크론 표현식/, ["크론","헤르메스"]],
  [/타임존/, ["크론","트러블슈팅"]],
  [/CSS|뷰 트랜지션/, ["프론트엔드","CSS"]],
  [/레이트리밋/, ["백엔드","API"]],
  [/인덱스|실행계획/, ["데이터베이스","SQL"]],
  [/트랜잭션|격리/, ["데이터베이스","SQL"]],
  [/스몰톡|표현 모음/, ["영어","회화"]],
  [/가정법/, ["영어","문법"]],
  [/설치.*첫 실행|첫 실행/, ["설정","오픈클로"]],
  [/설치|PATH/, ["설정"]],
];
function guessTags(title){ for(const [re,tags] of TAG_HINTS) if(re.test(title)) return tags; return []; }
function rebuildAttach(e){
  const fa=(e.files||[]).map(f=>({t: f.kind==='video'?'video':'doc', n:f.name}));
  const la=(e.links||[]).map(l=>({t:'link', n:l.label||l.url}));
  e.attach=[...fa,...la];
}
function backfillEntry(e){
  e.id=e.id||neid();
  e.tags=e.tags||guessTags(e.title);
  if(!e.files) e.files=(e.attach||[]).filter(a=>a.t!=='link').map(a=>({name:a.n,kind:a.t}));
  if(!e.links) e.links=(e.attach||[]).filter(a=>a.t==='link').map(a=>({label:a.n,url:'#'}));
}
(function walkBackfill(list){ list.forEach(n=>{ if(n.leaf)(n.entries||[]).forEach(backfillEntry); if(n.kids)walkBackfill(n.kids); }); })(data);

/* ---------------- helpers ---------------- */
const $ = s => document.querySelector(s);
let selectedId = null;
const byId = (id, list=data, parent=null) => {
  for(const n of list){
    if(n.id===id) return {node:n, parent, list};
    if(n.kids){ const r = byId(id, n.kids, n); if(r) return r; }
  }
  return null;
};
const colorOf = node => {
  // inherit top-level color
  const find = (list, top) => {
    for(const n of list){
      const t = top || n.color;
      if(n.id===node.id) return t;
      if(n.kids){ const r = find(n.kids, t); if(r) return r; }
    }
  };
  return find(data) || PALETTE[0];
};
const countEntries = node => {
  if(node.leaf) return (node.entries||[]).length;
  return (node.kids||[]).reduce((s,k)=>s+countEntries(k),0);
};
const countLeaves = node => {
  if(node.leaf) return {done:(node.entries&&node.entries.length)?1:0, total:1};
  return (node.kids||[]).reduce((a,k)=>{const r=countLeaves(k);return{done:a.done+r.done,total:a.total+r.total}},{done:0,total:0});
};
const relDay = ds => {
  const d=new Date(ds+"T00:00"), today=new Date("2026-06-19T00:00");
  const diff=Math.round((today-d)/86400000);
  if(diff===0) return "오늘"; if(diff===1) return "어제"; if(diff<7) return diff+"일 전";
  if(diff<30) return Math.floor(diff/7)+"주 전"; return Math.floor(diff/30)+"개월 전";
};
const depthOf = (id, list=data, d=1) => {
  for(const n of list){
    if(n.id===id) return d;
    if(n.kids){ const r=depthOf(id,n.kids,d+1); if(r) return r; }
  }
  return null;
};

/* ---------------- inline rename ---------------- */
function startInlineRename(node, row){
  const nameSpan=row.querySelector(".name"); if(!nameSpan) return;
  const input=document.createElement("input");
  input.className="inline-rename"; input.value=node.name;
  nameSpan.replaceWith(input); input.focus(); input.select();
  let done=false;
  function commit(){
    if(done) return; done=true;
    const v=input.value.trim(); if(v) node.name=v;
    renderTree(); if(selectedId) renderMain();
  }
  function cancel(){ if(done) return; done=true; renderTree(); }
  input.addEventListener("keydown",e=>{
    e.stopPropagation();
    if(e.key==="Enter"){ e.preventDefault(); commit(); }
    else if(e.key==="Escape"){ e.preventDefault(); cancel(); }
  });
  input.addEventListener("blur",commit,{once:true});
}

/* ---------------- tree render ---------------- */
function renderTree(){
  const root = $("#tree"); root.innerHTML="";
  data.forEach(n => root.appendChild(nodeEl(n)));
}
function nodeEl(n){
  const wrap = document.createElement("div");
  wrap.className = "node" + (n.open?" open":"");
  wrap.dataset.id = n.id;

  const row = document.createElement("div");
  row.className = "row" + (n.id===selectedId?" sel":"");
  row.draggable = true;
  row.dataset.id = n.id;
  row.dataset.name = n.name;

  const cnt = countEntries(n);
  const col = colorOf(n);
  row.innerHTML = `
    <span class="twist${n.leaf?' leaf':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 6 6 6-6 6"/></svg></span>
    ${n.leaf ? `<span class="emoji">${n.emoji||'📄'}</span>`
             : `<span class="dot" style="background:${col.dot}"></span><span class="emoji">${n.emoji||'📁'}</span>`}
    <span class="name">${n.name}</span>
    ${cnt? `<span class="count">${cnt}</span>`:''}`;
  wrap.appendChild(row);

  if(!n.leaf){
    const kids = document.createElement("div"); kids.className="kids";
    (n.kids||[]).forEach(k => kids.appendChild(nodeEl(k)));
    wrap.appendChild(kids);
  }

  /* interactions */
  row.tabIndex = 0;
  row.addEventListener("click", e=>{
    if(e.detail>=2) return; // handled by dblclick
    e.stopPropagation();
    if(navCollapsed){ navCollapsed=false; document.querySelector(".app").classList.remove("nav-collapsed"); }
    if(!n.leaf){ n.open=!n.open; wrap.classList.toggle("open"); }
    select(n.id);
  });
  row.addEventListener("dblclick", e=>{
    e.stopPropagation();
    if(navCollapsed){ navCollapsed=false; document.querySelector(".app").classList.remove("nav-collapsed"); }
    startInlineRename(n, row);
  });
  row.addEventListener("keydown", e=>{
    if(e.key==="Enter"||e.key===" "){ e.preventDefault(); row.click(); }
  });
  row.addEventListener("contextmenu", e=>{ e.preventDefault(); select(n.id); openCtx(e.clientX,e.clientY,n); });
  row.querySelector(".emoji").addEventListener("click", e=>{
    e.stopPropagation();
    if(navCollapsed){
      // collapsed state: expand sidebar and navigate to this category
      navCollapsed=false;
      document.querySelector(".app").classList.remove("nav-collapsed");
      if(!n.leaf){ n.open=!n.open; wrap.classList.toggle("open"); }
      select(n.id);
      return;
    }
    openEmojiPicker(e.clientX,e.clientY,n);
  });

  /* drag & drop */
  row.addEventListener("dragstart", e=>{ e.stopPropagation(); dragId=n.id; row.classList.add("dragging");
    e.dataTransfer.effectAllowed="move"; });
  row.addEventListener("dragend", ()=>row.classList.remove("dragging"));
  row.addEventListener("dragover", e=>{
    if(n.id===dragId) return; e.preventDefault(); e.stopPropagation();
    const rect=row.getBoundingClientRect();
    const relY=(e.clientY-rect.top)/rect.height;
    const zone = (!n.leaf && relY>0.28 && relY<0.72) ? "nest" : (relY<=0.5 ? "before" : "after");
    row.dataset.zone=zone;
    row.classList.remove("drop-nest","drop-before","drop-after");
    row.classList.add(zone==="nest"?"drop-nest":zone==="before"?"drop-before":"drop-after");
  });
  row.addEventListener("dragleave", ()=>row.classList.remove("drop-nest","drop-before","drop-after"));
  row.addEventListener("drop", e=>{
    e.preventDefault(); e.stopPropagation();
    const zone=row.dataset.zone||"after";
    row.classList.remove("drop-nest","drop-before","drop-after");
    dropOn(n, e, zone);
  });
  return wrap;
}

/* ---------------- drag drop logic ---------------- */
let dragId=null;
function isDescendant(node, id){
  if(node.id===id) return true;
  return (node.kids||[]).some(k=>isDescendant(k,id));
}
function dropOn(target, ev, zone){
  if(!dragId || dragId===target.id) return;
  const src = byId(dragId); if(!src) return;
  if(isDescendant(src.node, target.id)) { bubbleSay("거기엔 못 넣어요! 🙈"); dragId=null; return; }
  src.list.splice(src.list.indexOf(src.node),1);
  if(zone==="nest" && !target.leaf){
    target.kids = target.kids||[];
    target.kids.push(src.node);
    target.open = true;
    bubbleSay("정리 완료! 🎉");
  }else{
    const tgtInfo = byId(target.id);
    let idx = tgtInfo.list.indexOf(target);
    if(zone==="after") idx++;
    tgtInfo.list.splice(idx, 0, src.node);
    bubbleSay("순서 변경 완료! 🔀");
  }
  renderTree();
  burst(ev.clientX, ev.clientY);
  dragId=null;
}

/* ---------------- selection / main ---------------- */
function select(id){
  selectedId=id; viewMode="tree";
  const statsBtn=document.getElementById("btn-stats");
  if(statsBtn) statsBtn.classList.remove("active");
  document.querySelectorAll(".row").forEach(r=>r.classList.toggle("sel", r.dataset.id===id));
  renderMain();
}
function pathOf(id){
  const out=[]; const walk=(list,trail)=>{
    for(const n of list){ const t=[...trail,n];
      if(n.id===id){ out.push(...t); return true; }
      if(n.kids && walk(n.kids,t)) return true; }
    return false;
  }; walk(data,[]); return out;
}

function allEntries(){ return allLeaves().flatMap(n=>(n.entries||[]).map(e=>({...e,_node:n}))); }
function tagCounts(){ const m={}; allEntries().forEach(e=>(e.tags||[]).forEach(t=>{ m[t]=(m[t]||0)+1; })); return Object.entries(m).sort((a,b)=>b[1]-a[1]); }
function dailyCounts(days=14){ const today=new Date("2026-06-19T00:00"); const out=[];
  for(let i=days-1;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i);

  return out; }

let acParent=null, acLeaf=false, acEmoji="📁";
function openAddChild(parent, leaf){
  acParent=parent; acLeaf=leaf;
  acEmoji=leaf?"📘":"📁";
  document.getElementById("ac-emoji").textContent=acEmoji;
  document.getElementById("ac-name").value="";
  document.getElementById("ac-name").placeholder=leaf?"학습 기록함 이름을 입력하세요…":"카테고리 이름을 입력하세요…";
  document.getElementById("ac-hint").textContent=leaf?"소분류 기록함을 추가합니다":"하위 카테고리를 추가합니다";
  document.getElementById("add-child-overlay").classList.add("show");
  setTimeout(()=>document.getElementById("ac-name").focus(),60);
}
function confirmAddChild(){
  const name=document.getElementById("ac-name").value.trim(); if(!name) return;
  const depth=depthOf(acParent.id)||1;
  // guard: depth 1 → folder only, depth 2 → leaf only, depth ≥ 3 → nothing
  if(depth>=4){ bubbleSay("소분류까지가 최대예요! 학습 기록함을 추가해보세요 📝"); return; }
  if(depth<3 && acLeaf){ bubbleSay("학습 기록함은 소분류(3단계)에서만 추가할 수 있어요 📘"); return; }
  if(depth===3 && !acLeaf){ bubbleSay("소분류에는 학습 기록함만 추가할 수 있어요 📘"); return; }
  acParent.kids=acParent.kids||[];
  acParent.leaf=false;
  const n={id:nid(), name, emoji:acEmoji};
  if(acLeaf){ n.leaf=true; n.entries=[]; } else n.kids=[];
  acParent.kids.push(n); acParent.open=true;
  renderTree(); select(n.id);
  document.getElementById("add-child-overlay").classList.remove("show");
  burst(160,80); bubbleSay(acLeaf?"학습 기록함 추가! 📘":"새 카테고리 추가! 📁");
}

/* search */
const searchClear = document.getElementById("search-clear");

function matchTree(node,q){
  if(!q) return true;
  if(node.name.toLowerCase().includes(q)) return true;
  if(node.entries){
    const tagQ = q.startsWith("#") ? q.slice(1) : null;
    if(node.entries.some(en=>{
      if(en.title.toLowerCase().includes(q)||en.body.toLowerCase().includes(q)) return true;
      if(tagQ) return (en.tags||[]).some(t=>t.toLowerCase().includes(tagQ));
      return (en.tags||[]).some(t=>t.toLowerCase().includes(q));
    })) return true;
  }
  return (node.kids||[]).some(k=>matchTree(k,q));
}

function searchEntries(q, list=data, trail=[]){
  const results=[];
  const tagQ = q.startsWith("#") ? q.slice(1) : null;
  for(const n of list){
    const t=[...trail,n];
    if(n.leaf && n.entries){
      n.entries.forEach(en=>{
        let hit = en.title.toLowerCase().includes(q)||en.body.toLowerCase().includes(q);
        if(!hit) hit = tagQ
          ? (en.tags||[]).some(t=>t.toLowerCase().includes(tagQ))
          : (en.tags||[]).some(t=>t.toLowerCase().includes(q));
        if(hit) results.push({node:n, entry:en, trail:t});
      });
    }
    if(n.kids) results.push(...searchEntries(q, n.kids, t));
  }
  return results;
}

function searchResultHTML({node, entry, trail}){
  const crumb = trail.map(n=>n.name).join(' › ');
  const bodySnippet = entry.body.replace(/^[-*]\s*/mg,'').replace(/\n+/g,' ').slice(0,100);
  const tags = (entry.tags||[]).map(t=>`<span class="tag-pill">#${t}</span>`).join('');
  const attachCount = (entry.attach||[]).length;
  return `<div class="search-hit" data-nid="${node.id}" data-eid="${entry.id}">
    <div class="search-hit-path">${crumb}</div>
    <div class="search-hit-title">${entry.title}</div>
    ${bodySnippet?`<div class="search-hit-body">${bodySnippet}</div>`:''}
    <div class="search-hit-foot">
      <span>${fmt(entry.date)}</span>
      ${attachCount?`<span>📎 ${attachCount}개</span>`:''}
      ${tags}
    </div>
  </div>`;
}

function renderSearchResults(q){
  const results = searchEntries(q);
  const m = $("#main");
  const countText = results.length ? `${results.length}개 기록 매칭` : '결과 없음';
  m.innerHTML = `
    <div class="crumbs"><span>검색</span><span class="sep">›</span><b>'${q}'</b></div>
    <div class="page-head">
      <div class="page-title">
        <div class="badge" style="background:var(--accent-soft)">🔍</div>
        <div><h1>검색 결과</h1><p>${countText}</p></div>
      </div>
    </div>
    ${results.length
      ? `<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">${results.map(r=>searchResultHTML(r)).join('')}</div>`
      : `<div class="empty"><div class="big">🔍</div><h3>결과가 없어요</h3><p>'${q}' 와 관련된 기록을 찾지 못했어요<br>제목·내용·태그를 모두 검색해봤어요</p></div>`}`;
  m.querySelectorAll(".search-hit").forEach(el=>{
    el.addEventListener("click",()=>{
      const nid=el.dataset.nid, eid=el.dataset.eid;
      pathOf(nid).forEach(p=>{if(!p.leaf)p.open=true});
      renderTree(); selectedId=nid; viewMode="tree"; renderMain();
      setTimeout(()=>{
        const en=document.querySelector(`.entry[data-eid="${eid}"]`);
        if(en){ en.style.outline="2px solid var(--accent)"; en.style.borderRadius="14px";
          setTimeout(()=>en.style.outline="",1800); }
      },120);
    });
  });
}

$("#search").addEventListener("input",e=>{
  const q=e.target.value.trim().toLowerCase();
  searchClear.classList.toggle("show", q.length > 0);
  if(q){
    renderSearchResults(q);
    document.querySelectorAll(".node").forEach(el=>{
      const {node}=byId(el.dataset.id);
      const hit=matchTree(node,q);
      el.style.display=hit?"":"none";
      if(hit&&node.kids) el.classList.add("open");
    });
  } else {
    document.querySelectorAll(".node").forEach(el=>el.style.display="");
    renderMain();
  }
});
searchClear.addEventListener("click",()=>{
  const si=document.getElementById("search");
  si.value=""; searchClear.classList.remove("show");
  si.dispatchEvent(new Event("input")); si.focus();
});

/* ---------------- mascot + sparkle ---------------- */
let bubbleT;
function bubbleSay(msg){
  const b=$("#bubble"); b.textContent=msg; b.classList.add("show");
  $("#mochi").style.animation="none"; void $("#mochi").offsetWidth; $("#mochi").style.animation="bob 3.2s ease-in-out infinite";
  clearTimeout(bubbleT); bubbleT=setTimeout(()=>b.classList.remove("show"),2600);
}
function burst(x,y){
  const fx=$("#fx"); const em=["✨","🎉","⭐","💫","🌸","💜"];
  for(let i=0;i<12;i++){
    const s=document.createElement("span"); s.className="spark"; s.textContent=em[i%em.length];
    s.style.left=x+"px"; s.style.top=y+"px";
    const ang=Math.random()*6.28, dist=40+Math.random()*70;
    s.style.setProperty("--dx",Math.cos(ang)*dist+"px");
    s.style.setProperty("--dy",(Math.sin(ang)*dist-30)+"px");
    s.style.animationDelay=(Math.random()*.1)+"s";
    fx.appendChild(s); setTimeout(()=>s.remove(),900);
  }
}
$("#mochi").parentElement.style.pointerEvents="auto";
$("#mochi").addEventListener("click",()=>{const m=["화이팅! 💪","꾸준함이 최고예요 🌟","좋아좋아! 🎈","오늘도 한 칸 채워봐요 ✏️"];
  bubbleSay(m[Math.floor(Math.random()*m.length)]);});

/* ---------------- init ---------------- */
// open default path to 개념정리
(function initSel(){
  const walk=(list)=>{for(const n of list){ if(n.sel){selectedId=n.id; pathOf(n.id).forEach(p=>{if(!p.leaf)p.open=true}); return true;} if(n.kids&&walk(n.kids))return true;} return false;};
  walk(data);
})();
renderTree(); renderMain();
setTimeout(()=>bubbleSay("오늘도 한 줄 기록해볼까? ✏️"),700);
</script>
